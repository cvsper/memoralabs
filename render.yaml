# MemoraLabs Render Deployment
# Persistent disk at /data -- NOT available during build
# Starter plan does NOT spin down (no free-tier sleep).
# UptimeRobot (free) is for monitoring only -- configure GET /health every 10 minutes.
# UptimeRobot URL: https://memoralabs.onrender.com/health

services:
  - type: web
    name: memoralabs-api
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    maxShutdownDelaySeconds: 30
    disk:
      name: memoralabs-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FIREWORKS_API_KEY
        sync: false
