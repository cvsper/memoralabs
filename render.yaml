# MemoraLabs Render Deployment
# Docker runtime — hnswlib requires C++ build tools not in native Python runtime.
# Persistent disk at /data -- NOT available during build.
# Starter plan does NOT spin down (no free-tier sleep).

services:
  - type: web
    name: memoralabs-api
    runtime: docker
    plan: starter
    region: oregon
    healthCheckPath: /health
    disk:
      name: memoralabs-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: FIREWORKS_API_KEY
        sync: false
